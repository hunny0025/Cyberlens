# ============================================================
# CyberLens v3.0 — Render Blueprint
# Deploy: https://render.com/docs/blueprint-spec
# ============================================================

services:
  - type: web
    name: cyberlens-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free             # using free tier to avoid payment requirement
    envVars:
      - key: PORT
        value: "8000"
      - key: AUTH_DISABLED
        value: "true"
      - key: DATABASE_URL
        value: "sqlite:///data/cyberlens.db"
      - key: PII_MASKING
        value: "true"
      - key: FRONTEND_URL
        sync: false        # set manually after Vercel deploy (e.g. https://cyberlens.vercel.app)
      - key: GEMINI_API_KEY
        sync: false        # set in Render dashboard
      - key: MISTRAL_API_KEY
        sync: false
